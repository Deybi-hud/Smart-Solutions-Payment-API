services:
  payment-postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-payments_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-payments_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-api
    restart: unless-stopped
    depends_on:
      payment-postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: payment-postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-payments_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSL: "false"
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4200}
    ports:
      - "3000:3000"

volumes:
  payment_postgres_data:
